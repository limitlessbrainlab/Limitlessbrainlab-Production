services:
  # Backend API Service
  - type: web
    name: neuro360-backend
    env: node
    region: singapore
    plan: free
    buildCommand: cd server && npm install && npx puppeteer browsers install chrome
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # Puppeteer cache must live INSIDE the project dir so Chrome installed at
      # build time persists to runtime (Render wipes ~/.cache between build/run).
      # Used by both the build `npx puppeteer browsers install chrome` and launch.
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_REQUEST_DELAY_MS
        value: "2000"
      - key: GEMINI_DAILY_LIMIT
        value: "50"
      - key: NEXAPROC_GATEWAY_URL
        value: http://187.127.176.1/neuro-sidecar
      - key: NEXAPROC_MASTER_KEY
        sync: false
      - key: CLAUDE_REPORT_TOKEN
        sync: false
      # Gates the /api/patient-documents endpoints (private patients_documents
      # bucket). Min 16 chars; must equal the frontend's VITE_PATIENT_DOCS_TOKEN.
      - key: PATIENT_DOCS_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        value: https://puzdgwtprcpaaxxwkwtk.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://limitlessbrainlab-eight.vercel.app
      # Gmail SMTP only. Outbound mail is sent directly via EMAIL_USER/EMAIL_PASS.
      # NOTE: Render free tier BLOCKS SMTP ports 25/465/587. Gmail below only works locally.
      # The Brevo relay on port 2525 is what actually delivers mail on Render.
      - key: EMAIL_USER
        value: info@limitlessbrainlab.com
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        value: info@limitlessbrainlab.com
      - key: EMAIL_TO
        sync: false
      # Brevo SMTP relay — Render-safe (port 2525 not blocked). Preferred over Gmail.
      # Brevo HTTP API key — preferred path (proven delivery, no SMTP needed).
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SMTP_USER
        value: b06de4001@smtp-brevo.com
      - key: BREVO_SMTP_KEY
        sync: false
      - key: BREVO_SMTP_PORT
        value: "2525"
      - key: SHARED_SSO_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: BANK_ACCOUNT_NAME
        sync: false
      - key: BANK_ACCOUNT_NUMBER
        sync: false
      - key: BANK_NAME
        sync: false
      - key: BANK_ADDRESS
        sync: false
      - key: BANK_IFSC_CODE
        sync: false
      - key: BANK_MICR_CODE
        sync: false
      - key: BANK_CUSTOMER_ID
        sync: false
      - key: DDO_DOCTOR_URL
        value: https://aisurgeonpilot.com
      - key: DDO_PATIENT_URL
        value: https://aidoccall.com
    disk:
      name: uploads-storage
      mountPath: /opt/render/project/src/server/uploads
      sizeGB: 1

  # Frontend Static Site
  - type: web
    name: neuro360-frontend
    env: static
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        value: https://puzdgwtprcpaaxxwkwtk.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_URL
        sync: false
      - key: VITE_CLAUDE_REPORT_TOKEN
        sync: false
      # Must equal the backend's PATIENT_DOCS_TOKEN (patient-document uploads).
      - key: VITE_PATIENT_DOCS_TOKEN
        sync: false
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
      - key: VITE_RAZORPAY_SECRET
        sync: false
      - key: VITE_APP_NAME
        value: Neuro360
      - key: VITE_SUPABASE_STORAGE_BUCKET
        value: patient-reports
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_DDO_DOCTOR_SLUG
        value: dr-dr-shweta-adatia-td6s
