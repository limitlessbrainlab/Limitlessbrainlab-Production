services:
  - type: web
    name: neuro360-backend
    env: node
    buildCommand: |
      apt-get update && apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Gmail SMTP only. Outbound mail uses EMAIL_USER/EMAIL_PASS directly.
      - key: EMAIL_USER
        value: info@limitlessbrainlab.com
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        value: info@limitlessbrainlab.com
